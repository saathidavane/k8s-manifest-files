apiVersion: apps/v1
kind: StatefulSet 
metadata:
  name: secret-ss 
  labels:
    type: secret 
spec: 
  replicas: 3
  selector :
    matchLabels:
      type: secret  
  template: 
    metadata:
      name: ss-db-temp
      labels:
        type: secret  
    spec:
      containers:
      - name: mysql-cont
        image: mysql:latest
        ports:
        - containerPort: 3306
        env: 
        - name: MYSQL_ROOT_PASSWORD 
          valueFrom: 
            secretKeyRef:
              name: secret 
              key: MYSQL_ROOT_PASSWORD 
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef: 
              name: secret  
              key: MYSQL_USER
        - name: MYSQL_PASSWORD
          valueFrom: 
            secretKeyRef: 
              name: secret  
              key: MYSQL_PASSWORD
        - name: MYSQL_DATABASE
          valueFrom: 
            secretKeyRef:
              name: secret
              key: MYSQL_DATABASE 
