apiVersion: apps/v1 
kind: Deployment 
metadata:
  name: ru-pod
  labels:
    stat: roll-up
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    RollingUpdate:
      marSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      stat: roll-up 
  template:
    metadata:
      name: ru-temp
      labels: 
        stat: roll-up
  spec:
    containers:
    - name: nginx-cont
      image: nginx:latest
      ports:
      - containerPort: 80
      
...
---

apiVersion: v1 
kind: Service 
metadata:
  name: ru-svc
  labels:
    stat: roll-up 
spec:
  type: NodePort 
  selector:
    stat: roll up 
  ports:
  - port: 80
    targetPort: 80
