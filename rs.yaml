apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: rs-pod
  labels:
    env: rs-label
  namespace: ns-manifest
spec:
  replicas: 2
  selector:
    matchLabels:
      env: rs-label
  template:
    metadata:
      name: rs-temp
      labels:
        env: rs-label
    spec:
      containers:
        - name: httpd-rs-cont
          image: httpd
          ports:
          - name: rs-port
            containerPort: 80
...
---
apiVersion: v1 
kind: Service 
metadata: 
  name: rs-svc
  labels:
    env: rs-label
spec:
  type: LoadBalancer
  selector:
    env: rs-label
  ports:
  - name: rs-svc-port
    protocol: TCP
    port: 80 
    targetPort: 80
