apiVersion: apps/v1
kind: Deployment 
metadata:
  name: deploy-pod
  labels: 
    stat: deploy 
spec:
  replicas: 3
  strategy:
    type: Recreate 
  selector:
    matchLabels:
      stat: deploy 
  template:
    metadata:
      name: Recreate-temp
      labels:
        stat: deploy 
    spec:
      containers:
      - name: nginx:container
        image: nginx 
        ports:
        - containerPort: 80

...
---
apiVersion: v1 
kind: Service 
metadata:
  name: deploy-svc
  labels:
    stat: deploy
spec:
  type: NodePort 
  selector: 
    stat: deploy 
  ports: 
  - protocol: TCP
    port: 80
    targetPort: 80