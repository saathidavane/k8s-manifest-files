apiVersion: v1 
kind: Pod 
metadata:
  name: scpod
  labels:
    type: storage 
spec: 
  containers:
  - name: nginx-cont 
    image: nginx:latest
    volumeMounts: 
    - name: myvol
      mountPath: /usr/share/nginx/html
  volumes: 
  - name: myvol 
    persistentVolumeClaim:
      claimName: mypvc