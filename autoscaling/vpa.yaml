apiVersion: autoscaling.k8s.io/v1
kind:  VerticalPodAutoscaler
metadata:
    name: vpa 
    labels: 
      type: autoscale 
    namespace: autoscaling 
spec: 
  targetRef: 
    apiVersion: apps/v1
    kind: Deployment 
    name: vpa-deploy 
  updatePolicy:
    updateMode: Auto 
  resourcePolicy:
    containerPolicies:
    - containerName: nginx-cont 
      minAllowed:
        cpu: 100m
        memory: 128Mi
      maxAllowed:
        cpu: 200m
        memory: 256Mi 