apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: 
  name: hpa 
  labels:
    type: autoscale 
  namespace: autoscaling 
  spec: 
    scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment 
    name: hpa-deploy 
  minReplicas: 1
  maxReplicas: 5
  metrics: 
  - type: Resources 
    resources: 
      name: cpu
      target: 
        type: utilization 
        averageutilization: 50 